name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version"
        required: true
      next_snapshot_version:
        description: "Next SNAPSHOT version, e.g. 1.0.1-SNAPSHOT"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Configure Git
        run: |
          git config user.name "release-bot"
          git config user.email "release-bot@users.noreply.github.com"

      - name: Set Maven release version
        run: |
          mvn versions:set -DnewVersion=${{ inputs.version }}
          mvn versions:commit

      - name: Commit release version and tag
        run: |
          git add -u
          git commit -m "Release ${{ inputs.version }}"
          git tag v${{ inputs.version }}

      - name: Set next snapshot version
        run: |
          mvn versions:set -DnewVersion=${{ inputs.next_snapshot_version }}
          mvn versions:commit

      - name: Commit next snapshot version
        run: |
          git add -u
          git commit -m "Prepare next development version ${{ inputs.next_snapshot_version }}"

      - name: Push branch and tag
        run: |
          git push origin HEAD:main
          git push origin v${{ inputs.version }}

      - name: Create GitHub release
        run: |
          gh release create v${{ inputs.version }} \
            --title "v${{ inputs.version }}" \
            --notes "Release v${{ inputs.version }}"
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
