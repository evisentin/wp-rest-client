name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version"
        required: true
      next_snapshot_version:
        description: "Next SNAPSHOT version, e.g. 1.0.1-SNAPSHOT"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set Maven release version
        run: |
          mvn versions:set -DnewVersion=${{ inputs.version }}
          mvn versions:commit

      - name: Commit release version
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -u
          git commit -m "Release ${{ inputs.version }}"

      - name: Create tag
        run: |
          git tag v${{ inputs.version }}
          git push origin HEAD
          git push origin v${{ inputs.version }}

      - name: Create GitHub release
        run: |
          gh release create v${{ inputs.version }} \
            --title "v${{ inputs.version }}" \
            --notes "Release v${{ inputs.version }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set next snapshot version
        run: |
          mvn versions:set -DnewVersion=${{ inputs.next_snapshot_version }}
          mvn versions:commit

      - name: Commit next snapshot version
        run: |
          git add -u
          git commit -m "Prepare next development version ${{ inputs.next_snapshot_version }}"
          git push origin HEAD
