# Default log level
org.slf4j.simpleLogger.defaultLogLevel=info

# Enable debug for your HTTP logging
org.slf4j.simpleLogger.log.com.ev.wordpress.client=debug

# Show timestamps
org.slf4j.simpleLogger.showDateTime=true
org.slf4j.simpleLogger.dateTimeFormat=yyyy-MM-dd HH:mm:ss.SSS

# Show thread name (useful for parallel tests)
org.slf4j.simpleLogger.showThreadName=true

# Show log name (short = class name only)
org.slf4j.simpleLogger.showLogName=true
org.slf4j.simpleLogger.showShortLogName=true

# Optional: log to System.out instead of System.err
org.slf4j.simpleLogger.logFile=System.out
