# HTTPS virtual host configuration (port 443)
<VirtualHost *:443>

    # The hostname this virtual host responds to (used for routing and SSL)
    ServerName localhost

    # Root directory where WordPress files are served from
    DocumentRoot /var/www/html

    # Enable SSL/TLS for this virtual host
    SSLEngine on

    # Path to the server's SSL certificate (self-signed in this setup)
    SSLCertificateFile /etc/apache2/ssl/server.crt

    # Path to the corresponding private key
    SSLCertificateKeyFile /etc/apache2/ssl/server.key

    # Allow encoded slashes (%2F) in URLs without decoding them.
    # Important for REST APIs (like WordPress) where encoded paths may be used.
    AllowEncodedSlashes NoDecode

    # Directory-specific configuration for the WordPress root
    <Directory /var/www/html>

        # Allow .htaccess files to override Apache settings.
        # Required for WordPress permalinks and rewrites.
        AllowOverride All

        # Allow access to all clients (no access restrictions)
        Require all granted

    </Directory>

</VirtualHost>

# NOTE:
# - This configuration is intended for local development/testing only.
# - The certificate is self-signed and not trusted by browsers.
