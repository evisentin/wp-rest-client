# ---------------------------------------------------------------------------------------------------------------------
# MkDocs Configuration
#
# This file defines the configuration for the project documentation site, including navigation structure,
# theme settings, plugins, markdown extensions, and build options.
#
# The documentation content referenced by this configuration is located in the `docs/` directory.
# All Markdown files, assets, and navigation entries should be maintained under that folder unless otherwise configured.
#
# Documentation: https://www.mkdocs.org/user-guide/configuration/
# ---------------------------------------------------------------------------------------------------------------------
site_name: WP REST Client
site_description: Type-safe Java client for the WordPress REST API
site_url: https://evisentin.github.io/wp-rest-client/
# ---------------------------------------------------------------------------------------------------------------------
theme:
  name: material
# ---------------------------------------------------------------------------------------------------------------------
extra_css:
  - stylesheets/extra.css
# ---------------------------------------------------------------------------------------------------------------------
nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting_started/installation.md
      - Quick Start: getting_started/quick-start.md
      - Authentication: getting_started/authentication.md
  - Reference:
      - Supported APIs: reference/supported-apis.md
  - Development:
      - Architecture: development/architecture.md
      - Contributing: development/contributing.md
      - Developer Setup: development/developer-setup.md
  - Test Coverage: https://evisentin.github.io/wp-rest-client/coverage/
  - License: license.md
# ---------------------------------------------------------------------------------------------------------------------
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
      toc_depth: "2-4"
# ---------------------------------------------------------------------------------------------------------------------
